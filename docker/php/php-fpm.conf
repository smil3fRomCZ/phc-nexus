[www]
; Run as non-root user
user = appuser
group = appuser

; Listen on TCP
listen = 0.0.0.0:9000

; Process manager
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Logging
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no
