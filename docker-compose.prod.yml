# Production overrides — minimal volume mounts, built assets in image
# Caddy je sdílený (docker-compose.caddy.yml) — obsluhuje produkci i staging
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Resource limits jsou kalkulované pro 8 GB / 4 vCPU VPS se spolu-bydlícím
# stagingem. Prod ~5.5 GB + staging ~1.4 GB + Caddy ~256 MB = 7.2 GB,
# zbytek pro OS/buffers. Bez limitů může jeden runaway Horizon job srazit
# celou DB (OOM killer neumí vybírat — sežere, kdo je první).

services:
  app:
    container_name: prod-app
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1536m
    cpus: 1.5

  worker:
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app-storage:/var/www/html/storage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1024m
    cpus: 1.0

  scheduler:
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app-storage:/var/www/html/storage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 0.25

  caddy:
    profiles:
      - disabled

  postgres:
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 2048m
    cpus: 2.0

  redis-cache:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_CACHE_PASSWORD:?REDIS_CACHE_PASSWORD must be set}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 0.5

  redis-data:
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes --requirepass ${REDIS_DATA_PASSWORD:?REDIS_DATA_PASSWORD must be set}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 0.5

  mailpit:
    profiles:
      - debug

volumes:
  app-storage:
  app-public:
