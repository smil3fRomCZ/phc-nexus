# Production overrides — minimal volume mounts, built assets in image
# Caddy je sdílený (docker-compose.caddy.yml) — obsluhuje produkci i staging
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    container_name: prod-app
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  scheduler:
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  caddy:
    profiles:
      - disabled

  postgres:
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis-cache:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_CACHE_PASSWORD:-}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  redis-data:
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes --requirepass ${REDIS_DATA_PASSWORD:-}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mailpit:
    profiles:
      - debug

volumes:
  app-storage:
  app-public:
