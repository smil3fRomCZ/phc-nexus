services:
  # ==========================================================================
  # Application (PHP-FPM)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      - app-public:/var/www/html/public
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-data:
        condition: service_healthy
    networks:
      - app-network

  # ==========================================================================
  # Queue Worker (Horizon)
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: php artisan horizon
    depends_on:
      - app
    healthcheck:
      # Horizon neposkytuje explicitní status metriku na FS; artisan příkaz
      # vrací textový status. `running` = healthy, všechno ostatní = unhealthy
      # (restart-unless-stopped potom kontejner znovu nastartuje).
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q 'running' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  # ==========================================================================
  # Scheduler (cron)
  # ==========================================================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    # Heartbeat file je touched na každé iteraci → healthcheck vidí posledních
    # 60 s. Bez něj bychom neuměli detekovat zamrzlý scheduler (proces běží,
    # ale schedule:run navždy čeká na lock/DB).
    command: sh -c "while true; do touch /tmp/scheduler.heartbeat; php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/scheduler.heartbeat -mmin -2 2>/dev/null | grep -q heartbeat || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ==========================================================================
  # Vite dev server (HMR)
  # ==========================================================================
  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/var/www/html
      - vite-node-modules:/var/www/html/node_modules
    environment:
      - VITE_HMR_HOST=localhost
      - VITE_HMR_CLIENT_PORT=5173
    networks:
      - app-network

  # ==========================================================================
  # Caddy (reverse proxy + TLS)
  # ==========================================================================
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - app-network

  # ==========================================================================
  # PostgreSQL 17 (latest stable)
  # ==========================================================================
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phc_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-phc_nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phc_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================================================
  # Redis — Cache (allkeys-lru)
  # ==========================================================================
  redis-cache:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================================================
  # Redis — Data (noeviction, sessions + queues)
  # ==========================================================================
  redis-data:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================================================
  # Mailpit (email testing)
  # ==========================================================================
  mailpit:
    image: axllent/mailpit:v1.29.6
    networks:
      - app-network

volumes:
  app-public:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  vite-node-modules:

networks:
  app-network:
    driver: bridge
