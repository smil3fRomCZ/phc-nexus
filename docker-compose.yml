services:
  # ==========================================================================
  # Application (PHP-FPM)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
    # Laravel reads .env from volume mount — no env_file needed in dev
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-data:
        condition: service_healthy
    networks:
      - app-network

  # ==========================================================================
  # Queue Worker (Horizon)
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
    # Laravel reads .env from volume mount — no env_file needed in dev
    depends_on:
      - app
    networks:
      - app-network

  # ==========================================================================
  # Scheduler (cron)
  # ==========================================================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
    # Laravel reads .env from volume mount — no env_file needed in dev
    depends_on:
      - app
    networks:
      - app-network

  # ==========================================================================
  # Vite dev server (HMR)
  # ==========================================================================
  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/var/www/html
      - vite-node-modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_HMR_HOST=localhost
      - VITE_HMR_CLIENT_PORT=5173
    networks:
      - app-network

  # ==========================================================================
  # Caddy (reverse proxy + TLS)
  # ==========================================================================
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
      - vite
    networks:
      - app-network

  # ==========================================================================
  # PostgreSQL 17 (latest stable)
  # ==========================================================================
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: phc_nexus
      POSTGRES_USER: phc_nexus
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phc_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================================================
  # Redis — Cache (allkeys-lru)
  # ==========================================================================
  redis-cache:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================================================
  # Redis — Data (noeviction, sessions + queues)
  # ==========================================================================
  redis-data:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ==========================================================================
  # Mailpit (email testing)
  # ==========================================================================
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  vite-node-modules:

networks:
  app-network:
    driver: bridge
