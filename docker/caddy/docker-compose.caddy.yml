services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - prod-public:/var/www/html/public:ro
      - prod-storage:/var/www/html/storage:ro
      - staging-public:/var/www/html/public-staging:ro
      - staging-storage:/var/www/html/storage-staging:ro
    environment:
      DOMAIN: ${DOMAIN:-phc-nexus.eu}
      STAGING_AUTH_USER: ${STAGING_AUTH_USER:-staging}
      STAGING_AUTH_HASH: ${STAGING_AUTH_HASH}
      STAGING_TRUSTED_IPS: ${STAGING_TRUSTED_IPS:-0.0.0.0}
    networks:
      - prod-network
      - staging-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    # Caddy admin endpoint je `off` (security sprint 1), proto TCP probe
    # na :80 — pokud Caddy neběží, `nc` failne a Docker restartne kontejner.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5

volumes:
  caddy-data:
  caddy-config:
  prod-public:
    external: true
    name: phc-nexus_app-public
  prod-storage:
    external: true
    name: phc-nexus_app-storage
  staging-public:
    external: true
    name: phc-nexus-staging_app-public
  staging-storage:
    external: true
    name: phc-nexus-staging_app-storage

networks:
  prod-network:
    external: true
    name: phc-nexus_app-network
  staging-network:
    external: true
    name: phc-nexus-staging_app-network
