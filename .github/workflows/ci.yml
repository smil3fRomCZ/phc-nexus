name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: phc_nexus_test
          POSTGRES_USER: phc_nexus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U phc_nexus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, redis, intl, zip, bcmath, pcntl
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Copy env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      # ── Frontend checks ──
      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Vitest (unit)
        run: npm run test

      - name: Vite build
        run: npm run build

      # ── Backend checks ──
      - name: Laravel Pint (code style)
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      # ── Backend tests ──
      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: phc_nexus_test
          DB_USERNAME: phc_nexus
          DB_PASSWORD: secret
          REDIS_CACHE_HOST: 127.0.0.1
          REDIS_CACHE_PORT: 6379
          REDIS_DATA_HOST: 127.0.0.1
          REDIS_DATA_PORT: 6379
          CACHE_STORE: redis
          CACHE_REDIS_CONNECTION: cache
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: redis
          SESSION_CONNECTION: data
        run: php artisan test
