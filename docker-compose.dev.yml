# Dev overrides — NENAČÍTÁ se automaticky, nutno zadat explicitně:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro

  worker:
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro

  scheduler:
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
