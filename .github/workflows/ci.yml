name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: phc_nexus_test
          POSTGRES_USER: phc_nexus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U phc_nexus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, redis, intl, zip, bcmath, pcntl
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      # ── Dependency security audit ──
      - name: Composer audit
        run: composer audit

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Copy env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      # ── Frontend checks ──
      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Vitest (unit)
        run: npm run test

      - name: Vite build
        run: npm run build

      # ── Backend checks ──
      - name: Laravel Pint (code style)
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      # ── Backend tests ──
      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: phc_nexus_test
          DB_USERNAME: phc_nexus
          DB_PASSWORD: secret
          REDIS_CACHE_HOST: 127.0.0.1
          REDIS_CACHE_PORT: 6379
          REDIS_DATA_HOST: 127.0.0.1
          REDIS_DATA_PORT: 6379
          CACHE_STORE: redis
          CACHE_REDIS_CONNECTION: cache
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: redis
          SESSION_CONNECTION: data
        run: php artisan test

      # ── E2E tests (Playwright) ──
      - name: Seed database for E2E
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: phc_nexus_test
          DB_USERNAME: phc_nexus
          DB_PASSWORD: secret
          REDIS_CACHE_HOST: 127.0.0.1
          REDIS_CACHE_PORT: 6379
          REDIS_DATA_HOST: 127.0.0.1
          REDIS_DATA_PORT: 6379
          CACHE_STORE: redis
          CACHE_REDIS_CONNECTION: cache
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: redis
          SESSION_CONNECTION: data
        run: php artisan migrate:fresh --seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Laravel server
        env:
          APP_ENV: testing
          APP_URL: http://127.0.0.1:8000
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: phc_nexus_test
          DB_USERNAME: phc_nexus
          DB_PASSWORD: secret
          REDIS_CACHE_HOST: 127.0.0.1
          REDIS_CACHE_PORT: 6379
          REDIS_DATA_HOST: 127.0.0.1
          REDIS_DATA_PORT: 6379
          CACHE_STORE: redis
          CACHE_REDIS_CONNECTION: cache
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: redis
          SESSION_CONNECTION: data
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            curl -s http://127.0.0.1:8000/up && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
