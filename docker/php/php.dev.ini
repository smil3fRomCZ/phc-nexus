[PHP]
; Dev overrides — mounted over php.ini in development
memory_limit = 512M
max_execution_time = 0
upload_max_filesize = 64M
post_max_size = 64M

; OPcache — validate timestamps in dev for hot reload
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Error handling — show errors in dev
display_errors = On
log_errors = On
error_reporting = E_ALL

; Date
date.timezone = Europe/Prague
