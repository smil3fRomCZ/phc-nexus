# Production overrides — no volume mounts, built assets in image
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    volumes: !reset []
    restart: unless-stopped

  worker:
    volumes: !reset []
    restart: unless-stopped

  scheduler:
    volumes: !reset []
    restart: unless-stopped

  caddy:
    depends_on: !reset
      app:
        condition: service_started
    volumes: !reset
      - ./docker/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis-cache:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_CACHE_PASSWORD:-}
    restart: unless-stopped

  redis-data:
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes --requirepass ${REDIS_DATA_PASSWORD:-}
    restart: unless-stopped

  mailpit:
    profiles:
      - debug
