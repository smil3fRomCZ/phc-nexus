name: Deploy

on:
  # Automaticky po merge do master (po úspěšném CI)
  push:
    branches: [master]
  # Manuální spuštění z GitHub UI
  workflow_dispatch:
    inputs:
      target:
        description: 'Cíl deploye'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - both

# Zajistí že běží pouze jeden deploy najednou
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # CI check — nespouští deploy pokud testy padají
  # ==========================================================================
  ci-check:
    uses: ./.github/workflows/ci.yml

  # ==========================================================================
  # Build — jeden image pro obě prostředí
  # ==========================================================================
  build-image:
    needs: ci-check
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build Docker image na VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'set -e
            cd /opt/phc-nexus

            echo "=== Pulling latest code ==="
            git pull origin master

            echo "=== Building image ==="
            docker build -t phc-nexus:latest --target production .

            echo "=== Syncing staging repo ==="
            cd /opt/phc-nexus-staging
            git pull origin master

            echo "=== Build complete ==="'

  # ==========================================================================
  # Deploy Staging — automaticky po každém push na master
  # ==========================================================================
  deploy-staging:
    needs: build-image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'staging' ||
      github.event.inputs.target == 'both'

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy staging
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'set -e
            cd /opt/phc-nexus-staging

            echo "=== Starting staging services ==="
            COMPOSE_PROJECT_NAME=phc-nexus-staging \
              docker compose -f docker-compose.staging.yml up -d

            echo "=== Fresh DB + seed (staging = vždy čistý stav) ==="
            COMPOSE_PROJECT_NAME=phc-nexus-staging \
              docker compose -f docker-compose.staging.yml exec -T app \
              php artisan migrate:fresh --seed --force

            echo "=== Caching config ==="
            COMPOSE_PROJECT_NAME=phc-nexus-staging \
              docker compose -f docker-compose.staging.yml exec -T app \
              php artisan config:cache

            echo "=== Reloading shared Caddy ==="
            cd /opt/phc-nexus-shared
            docker compose -f docker-compose.caddy.yml exec -T caddy \
              caddy reload --config /etc/caddy/Caddyfile || true

            echo "=== Staging deploy complete ==="'

  # ==========================================================================
  # Deploy Production — vyžaduje manuální approve v GitHub UI
  # ==========================================================================
  deploy-production:
    needs: build-image
    runs-on: ubuntu-latest
    environment: production

    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.target == 'production' ||
       github.event.inputs.target == 'both')

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy production
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'set -e
            cd /opt/phc-nexus

            echo "=== Starting production services ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "=== Running migrations ==="
            docker compose exec -T app php artisan migrate --force

            echo "=== Clearing caches ==="
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache

            echo "=== Restarting Horizon ==="
            docker compose exec -T app php artisan horizon:terminate

            sleep 5

            echo "=== Health check ==="
            curl -sf --max-time 10 https://${{ secrets.DOMAIN }}/up || {
              echo "Health check failed!"
              exit 1
            }

            echo "=== Production deploy complete ==="'
