# Production overrides — minimal volume mounts, built assets in image
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
    restart: unless-stopped

  worker:
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
    restart: unless-stopped

  scheduler:
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
    restart: unless-stopped

  caddy:
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./docker/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - app-public:/var/www/html/public:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis-cache:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_CACHE_PASSWORD:-}
    restart: unless-stopped

  redis-data:
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes --requirepass ${REDIS_DATA_PASSWORD:-}
    restart: unless-stopped

  mailpit:
    profiles:
      - debug

volumes:
  app-storage:
  app-public:
